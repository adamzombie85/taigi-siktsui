<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顏色配對挑戰 - 台語色水學習網</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .quiz-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            text-align: center;
        }
        .question-text {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 40px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .option-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .option-card:hover {
            transform: scale(1.02);
            border-color: var(--accent-color);
        }
        .option-visual {
            height: 200px;
            background-size: cover;
            background-position: center;
        }
        .feedback {
            margin-top: 30px;
            font-size: 1.5rem;
            min-height: 2rem;
        }
        .correct { color: #4ade80; }
        .wrong { color: #f87171; }
        .next-btn {
            margin-top: 30px;
            padding: 12px 40px;
            font-size: 1.2rem;
        }
        .score-board {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>色水配對挑戰</h1>
            <p>看字揣色水，選出正確的圖！</p>
            <a href="index.html" class="nav-btn wide-btn" style="display:inline-block; margin-top:10px;">← 轉去博物館</a>
        </header>

        <div class="quiz-container">
            <div class="score-board">分數: <span id="score">0</span></div>
            <div id="quiz-body">
                <div class="question-text" id="question">載入中...</div>
                <div class="options-grid" id="options">
                    <!-- Options injected here -->
                </div>
                <div id="feedback" class="feedback"></div>
                <button id="next-btn" class="nav-btn wide-btn next-btn hidden">後一題</button>
            </div>
        </div>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
